<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de Tratamiento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            padding: 20px;
        }
        
        .container-fluid {
            padding: 0;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .page-header h2 {
            color: #333;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .page-header h2 i {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .btn-nuevo {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .btn-nuevo:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            color: white;
        }
        
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }
        
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .table-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead tr {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        th {
            padding: 15px;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            color: #333;
            font-size: 14px;
        }
        
        tbody tr:hover {
            background: #f8f9fa;
            transition: all 0.3s;
        }
        
        .badge-tipo {
            background: linear-gradient(135deg, #6c5ce7, #a463f5);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 12px;
        }
        
        .btn-action {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            margin: 0 3px;
            transition: all 0.3s;
            font-size: 13px;
        }
        
        .btn-edit {
            background: #ffc107;
            color: #333;
        }
        
        .btn-edit:hover {
            background: #e0a800;
            transform: translateY(-2px);
        }
        
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        
        .btn-delete:hover {
            background: #c82333;
            transform: translateY(-2px);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }
        
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 15px;
            overflow: hidden;
            animation: slideIn 0.3s ease-out;
        }
        
        .modal-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            margin: 0;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .modal-header .close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .modal-footer {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 25px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .alert {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1100;
            animation: slideInRight 0.3s ease-out;
        }
        
        .alert.success {
            background: linear-gradient(135deg, #28a745, #20c997);
        }
        
        .alert.error {
            background: linear-gradient(135deg, #dc3545, #c82333);
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- Header -->
        <div class="page-header">
            <h2>
                <i class="bi bi-tags"></i>
                Gestión de Tipos de Tratamiento
            </h2>
            <button class="btn-nuevo" onclick="abrirModal()">
                <i class="bi bi-plus-circle"></i>
                Nuevo Tipo
            </button>
        </div>

        <!-- Buscador -->
        <div class="search-box">
            <i class="bi bi-search"></i>
            <input type="text" id="buscador" placeholder="Buscar tipos de tratamiento..." onkeyup="buscarTabla()">
        </div>

        <!-- Tabla -->
        <div class="table-container">
            <table id="tablaTipos">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Clínica</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaBody">
                    <!-- Los datos se cargarán dinámicamente -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal para crear/editar -->
    <div class="modal" id="tipoModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">
                    <i class="bi bi-plus-circle"></i>
                    Nuevo Tipo de Tratamiento
                </h3>
                <button class="close" onclick="cerrarModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="tipoForm">
                    <input type="hidden" id="idTipoTratamiento">
                    
                    <div class="form-group">
                        <label>Nombre del Tipo</label>
                        <input type="text" id="nombreTipo" required maxlength="100" placeholder="Ingrese el nombre">
                    </div>
                    
                    <div class="form-group">
                        <label>Clínica</label>
                        <select id="clinicaId" required>
                            <option value="">Seleccione una clínica</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea id="descripcionTipo" rows="3" maxlength="255" placeholder="Ingrese una descripción"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="guardarTipo()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        // Variable global para el modal
        const modal = document.getElementById('tipoModal');
        
        // Cargar datos al iniciar
        document.addEventListener('DOMContentLoaded', function() {
            cargarTipos();
            cargarClinicas();
        });

        // Función para cargar tipos de tratamiento
        function cargarTipos() {
            fetch('/api/tipos-tratamiento')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('tablaBody');
                    tbody.innerHTML = '';
                    
                    data.forEach(tipo => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${tipo.idTipoTratamiento}</td>
                            <td><span class="badge-tipo">${tipo.nombreTipo}</span></td>
                            <td>${tipo.descripcionTipo || '-'}</td>
                            <td><i class="bi bi-building me-1"></i>${tipo.clinica?.nombreClinica || 'Sin clínica'}</td>
                            <td>
                                <button class="btn-action btn-edit" onclick="editarTipo(${tipo.idTipoTratamiento})">
                                    <i class="bi bi-pencil"></i> Editar
                                </button>
                                <button class="btn-action btn-delete" onclick="eliminarTipo(${tipo.idTipoTratamiento})">
                                    <i class="bi bi-trash"></i> Eliminar
                                </button>
                            </td>
                        `;
                        tbody.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    mostrarAlerta('Error al cargar los tipos de tratamiento', 'error');
                });
        }

        // Función para cargar clínicas en el select
        function cargarClinicas() {
            fetch('/api/clinicas')
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('clinicaId');
                    select.innerHTML = '<option value="">Seleccione una clínica</option>';
                    
                    data.forEach(clinica => {
                        const option = document.createElement('option');
                        option.value = clinica.idClinica;
                        option.textContent = clinica.nombreClinica;
                        select.appendChild(option);
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                });
        }

        // Función para abrir modal (nuevo)
        function abrirModal() {
            document.getElementById('modalTitle').innerHTML = '<i class="bi bi-plus-circle"></i> Nuevo Tipo de Tratamiento';
            document.getElementById('tipoForm').reset();
            document.getElementById('idTipoTratamiento').value = '';
            modal.classList.add('show');
        }

        // Función para cerrar modal
        function cerrarModal() {
            modal.classList.remove('show');
            document.getElementById('tipoForm').reset();
        }

        // Función para editar tipo
        function editarTipo(id) {
            fetch(`/api/tipos-tratamiento/${id}`)
                .then(response => response.json())
                .then(tipo => {
                    document.getElementById('modalTitle').innerHTML = '<i class="bi bi-pencil"></i> Editar Tipo de Tratamiento';
                    document.getElementById('idTipoTratamiento').value = tipo.idTipoTratamiento;
                    document.getElementById('nombreTipo').value = tipo.nombreTipo;
                    document.getElementById('descripcionTipo').value = tipo.descripcionTipo || '';
                    document.getElementById('clinicaId').value = tipo.clinica?.idClinica || '';
                    
                    modal.classList.add('show');
                })
                .catch(error => {
                    console.error('Error:', error);
                    mostrarAlerta('Error al cargar el tipo', 'error');
                });
        }

        // Función para guardar tipo
        function guardarTipo() {
            const id = document.getElementById('idTipoTratamiento').value;
            const nombre = document.getElementById('nombreTipo').value;
            const clinicaId = document.getElementById('clinicaId').value;
            const descripcion = document.getElementById('descripcionTipo').value;

            if (!nombre || !clinicaId) {
                mostrarAlerta('Por favor complete los campos requeridos', 'error');
                return;
            }

            const tipoData = {
                idTipoTratamiento: id || null,
                nombreTipo: nombre,
                descripcionTipo: descripcion,
                clinica: { idClinica: parseInt(clinicaId) }
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/tipos-tratamiento/${id}` : '/api/tipos-tratamiento';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(tipoData)
            })
            .then(response => {
                if (response.ok) {
                    cerrarModal();
                    cargarTipos();
                    mostrarAlerta(id ? 'Tipo actualizado con éxito' : 'Tipo creado con éxito', 'success');
                } else {
                    throw new Error('Error al guardar');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                mostrarAlerta('Error al guardar el tipo', 'error');
            });
        }

        // Función para eliminar tipo
        function eliminarTipo(id) {
            if (confirm('¿Está seguro de eliminar este tipo de tratamiento?')) {
                fetch(`/api/tipos-tratamiento/${id}`, {
                    method: 'DELETE'
                })
                .then(response => {
                    if (response.ok) {
                        cargarTipos();
                        mostrarAlerta('Tipo eliminado con éxito', 'success');
                    } else {
                        throw new Error('Error al eliminar');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    mostrarAlerta('Error al eliminar el tipo', 'error');
                });
            }
        }

        // Función para buscar en la tabla
        function buscarTabla() {
            const input = document.getElementById('buscador');
            const filter = input.value.toLowerCase();
            const rows = document.getElementById('tablaBody').getElementsByTagName('tr');

            for (let row of rows) {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(filter) ? '' : 'none';
            }
        }

        // Función para mostrar alertas
        function mostrarAlerta(mensaje, tipo) {
            const alerta = document.createElement('div');
            alerta.className = `alert ${tipo}`;
            alerta.textContent = mensaje;
            
            document.body.appendChild(alerta);
            
            setTimeout(() => {
                alerta.remove();
            }, 3000);
        }

        // Cerrar modal con ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modal.classList.contains('show')) {
                cerrarModal();
            }
        });

        // Cerrar modal al hacer click fuera
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                cerrarModal();
            }
        });
    </script>
</body>
</html>
